# Declared here (not in the image's main nginx.conf) because this file is
# spliced into the http{} context via `include /etc/nginx/conf.d/*.conf;` -
# zone/rate tuning is a starting point, not a measured production value.
limit_req_zone $binary_remote_addr zone=app_limit:10m rate=10r/s;

# File-based logs (in addition to the image's default stdout/stderr
# symlinks, which keep working for `docker logs`) - Fail2ban runs on the
# host, not in a container, and needs an actual file to tail. See
# docker/app/docker-compose.yml's `logs:` volume and scripts/README.md.
access_log /var/log/nginx-file/access.log;
error_log  /var/log/nginx-file/error.log warn;

server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    # Conservative starting point - tighten/loosen once the real app's asset
    # origins (fonts, analytics, etc.) are known.
    add_header Content-Security-Policy "default-src 'self'" always;

    # Single upstream - the app image serves both the API and the Next.js
    # static export (copied into its wwwroot) from one process, so there's
    # no /api/ vs everything-else split to make here anymore.
    location / {
        limit_req zone=app_limit burst=20 nodelay;
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
