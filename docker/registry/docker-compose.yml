name: registry

networks:
  registry_net:
    name: registry_net
    driver: bridge

volumes:
  registry_data:
    name: registry_data

services:
  registry:
    image: registry:2
    container_name: registry
    restart: unless-stopped
    stop_grace_period: 10s
    security_opt:
      - no-new-privileges:true
    environment:
      REGISTRY_HTTP_TLS_CERTIFICATE: /certs/fullchain.pem
      REGISTRY_HTTP_TLS_KEY: /certs/privkey.pem
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: "Registry Realm"
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
    ports:
      - "5000:5000"
    volumes:
      - registry_data:/var/lib/registry
      - ../../ssl/registry:/certs:ro
      - ./auth:/auth:ro
    networks:
      - registry_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 192M
    healthcheck:
      # Not exit-code based, on purpose: this image's BusyBox wget doesn't
      # follow GNU wget's documented exit-code table at all (confirmed live
      # via `docker exec ... wget ...; echo $?`) - it returns a flat 1 for
      # every HTTP error, 401 included, with no way to distinguish "server
      # is up and correctly demanding auth" from "server unreachable" by
      # exit code alone. -S prints the response status line regardless of
      # wget's own exit code, so grep for it instead: any 2xx/4xx means the
      # registry answered at the HTTP layer (401 from the htpasswd auth on
      # an unauthenticated request is expected and healthy); no match means
      # the connection itself failed. Confirmed still genuinely healthy via
      # a real `docker login`/push/pull against this registry throughout.
      test: ["CMD-SHELL", "wget -S --no-check-certificate -O /dev/null https://localhost:5000/v2/ 2>&1 | grep -qE 'HTTP/[0-9.]+ [24][0-9]{2}'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
