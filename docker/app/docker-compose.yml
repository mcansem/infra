name: app

networks:
  app_net:
    name: app_net
    driver: bridge

volumes:
  postgres_data:
    name: app_postgres_data

services:
  nginx:
    image: nginx:alpine
    container_name: app-nginx
    restart: unless-stopped
    stop_grace_period: 10s
    security_opt:
      - no-new-privileges:true
    depends_on:
      app:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../ssl/app:/etc/nginx/certs:ro
      - ../../ssl/.webroot:/var/www/certbot:ro
      # Host-visible logs, for Fail2ban's nginx jails (see scripts/README.md).
      # Not the image's default /var/log/nginx - that's symlinked to
      # stdout/stderr for `docker logs`; this is a separate path so both
      # keep working.
      - /var/log/infra/app-nginx:/var/log/nginx-file
    networks:
      - app_net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 32M
    healthcheck:
      # Same fix as docker/management-proxy/'s nginx healthcheck: port 80
      # redirects to https://$host/, wget sends Host: localhost, no cert
      # here has "localhost" in its SAN, so following the redirect fails
      # TLS hostname verification even though nginx is healthy. Hit 443
      # directly instead - and 127.0.0.1, not localhost, since "localhost"
      # resolves to ::1 first in this image and nginx ends up IPv4-only
      # despite the base image's IPv6-listen entrypoint script (see
      # docker/management-proxy/docker-compose.yml for the full reason:
      # envsubst-on-templates regenerates the config after that script
      # patches it, silently dropping the IPv6 listen directive again).
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: app-postgres
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 200M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Two images again, not one: the frontend moved from a build-time static
  # export to ISR (Incremental Static Regeneration), which needs a
  # persistent Next.js Node process to serve revalidation - it can no
  # longer be baked into the API's wwwroot at build time and shipped in
  # the same image/process. See CHANGELOG.md for the full reasoning this
  # reverses (content freshness: static export meant every content edit
  # needed a full CI/CD cycle to appear).
  app:
    image: ${REGISTRY_URL:?REGISTRY_URL is required}/${APP_IMAGE_NAME:?APP_IMAGE_NAME is required}:${APP_IMAGE_TAG:-latest}
    container_name: app
    restart: unless-stopped
    stop_grace_period: 20s
    security_opt:
      - no-new-privileges:true
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      # Fired by the admin panel's "Publish" action - tells `web` to
      # revalidate, instead of a full CI/CD rebuild-and-redeploy cycle.
      # ${REVALIDATE_SECRET} is the same value `web` checks incoming
      # revalidate requests against - one var, one .env, injected into
      # both services, so it can't drift out of sync between them (same
      # reasoning as GRAFANA_DOMAIN staying consistent across two files -
      # except this one's simpler, both services already share this file).
      Publish__WebhookUrl: http://web:3000/api/revalidate?secret=${REVALIDATE_SECRET:?REVALIDATE_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net
    deploy:
      resources:
        limits:
          # Also not measured against this specific codebase yet - same
          # `docker stats` pending note as `web`'s limit below.
          cpus: "0.5"
          memory: 220M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    image: ${REGISTRY_URL:?REGISTRY_URL is required}/${WEB_IMAGE_NAME:?WEB_IMAGE_NAME is required}:${WEB_IMAGE_TAG:-latest}
    container_name: app-web
    restart: unless-stopped
    stop_grace_period: 15s
    security_opt:
      - no-new-privileges:true
    environment:
      NODE_ENV: production
      # Internal Docker-network URL, not the public domain - server-side
      # ISR fetches go straight to `app`, skipping nginx's public proxy
      # hairpin entirely.
      API_BASE_URL: http://app:8080/api
      # Empty on purpose in every environment here: the client falls back
      # to a same-origin relative /api path (through nginx's own /api/
      # routing) rather than an absolute URL. Next.js inlines NEXT_PUBLIC_*
      # vars into the client bundle at build time, not container start -
      # if this ever needs to vary per environment, it has to become a
      # docker build --build-arg in the web image's Dockerfile, setting it
      # here at container runtime would have no effect on the already-
      # built bundle.
      NEXT_PUBLIC_API_URL: ""
      # Same value app.Publish__WebhookUrl's query string checks against -
      # see the comment there.
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:?REVALIDATE_SECRET is required}
    # ISR revalidation fetches the API at request time (unlike the old
    # static-export build-time fetch), so this needs `app` reachable at
    # runtime, not just at image-build time.
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app_net
    deploy:
      resources:
        limits:
          # Conservative placeholder, not measured on real host yet -
          # pending `docker stats` against the actual ISR image on the
          # GCP host. If it doesn't fit e2-micro's 1G alongside everything
          # else here, the next step up (e2-small) is no longer within
          # GCP's Always Free tier, so that's a real cost decision, not a
          # free bump - see docs/platforms/google-cloud.md.
          cpus: "0.5"
          memory: 220M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
