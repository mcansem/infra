name: monitoring-agent

networks:
  monitoring_agent_net:
    name: monitoring_agent_net
    driver: bridge

services:
  node-exporter:
    image: prom/node-exporter:v1.12.1
    container_name: node-exporter
    restart: unless-stopped
    stop_grace_period: 10s
    security_opt:
      - no-new-privileges:true
    # Host metrics (CPU/mem/disk/network). Bridge networking + a
    # loopback-only port publish, not `network_mode: host` - trades a
    # little network-interface metric fidelity for not exposing anything
    # beyond localhost by default. See README.md for the cross-host
    # scraping opt-in.
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - monitoring_agent_net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  cadvisor:
    image: ghcr.io/google/cadvisor:0.60.5
    container_name: cadvisor
    restart: unless-stopped
    stop_grace_period: 10s
    security_opt:
      - no-new-privileges:true
    # --privileged is NOT required for standard container metrics on
    # Ubuntu (only needed for process-level metrics with --pid=host, or
    # some CentOS/RHEL Docker daemon setups) - deliberately omitted.
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - monitoring_agent_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    # No compose-level healthcheck: cAdvisor's image tooling (shell/wget
    # availability) has changed across versions and isn't reliably
    # confirmed for this pin, so this intentionally defers to whatever
    # HEALTHCHECK (if any) the image itself defines, rather than risking
    # a healthcheck command that silently never succeeds.
