# Default: alerts fire and are visible in Alertmanager's own UI/API and in
# Grafana, but no external notification is sent - deciding where alerts
# should actually go (Slack, Discord, email, PagerDuty, ...) is a
# deployment-specific choice, and no notification credentials belong in
# this repo. To wire up a real receiver, replace the `null` receiver below
# with something like:
#
#   receivers:
#     - name: default
#       slack_configs:
#         - api_url: ${SLACK_WEBHOOK_URL}
#           channel: '#alerts'
#
# and inject SLACK_WEBHOOK_URL (or equivalent) via this file's own env_file
# once alertmanager.yml is templated the same way as
# docker/management-proxy/nginx.conf.template, or via a gitignored
# alertmanager.local.yml overlay - not committed here.

route:
  receiver: default
  group_by: ["alertname", "host_role"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: default
