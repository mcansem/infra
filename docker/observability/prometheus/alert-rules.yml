groups:
  - name: infra-defaults
    rules:
      - alert: HostDown
        expr: up{job=~"node-exporter.*"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Host exporter {{ $labels.instance }} is down"
          description: "node-exporter on {{ $labels.instance }} ({{ $labels.host_role }}) has been unreachable for 5 minutes."

      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"})) * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage above 85% on {{ $labels.instance }}"
          description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} is over 85% full."

      - alert: ContainerMissing
        expr: time() - container_last_seen{name!=""} > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} on {{ $labels.instance }} hasn't reported recently"
          description: "cAdvisor hasn't seen a metrics update from {{ $labels.name }} for over 60s - it may have stopped or been removed."
