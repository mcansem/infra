name: portainer-agent

networks:
  agent_net:
    name: agent_net
    driver: bridge

services:
  portainer_agent:
    image: portainer/agent:2.39.5-alpine
    container_name: portainer_agent
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - agent_net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://localhost:9001/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
