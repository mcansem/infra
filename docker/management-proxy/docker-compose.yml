name: management-proxy

# Both networks are external - created by jenkins/docker-compose.yml and
# docker/observability/docker-compose.yml respectively. Compose cannot
# express a cross-project `depends_on`, so deployment order matters: bring
# up jenkins/ and docker/observability/ first. See README.md.
networks:
  jenkins_net:
    name: jenkins_net
    external: true
  observability_net:
    name: observability_net
    external: true

services:
  nginx:
    image: nginx:alpine
    container_name: management-proxy
    restart: unless-stopped
    stop_grace_period: 10s
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ../../ssl:/etc/nginx/certs:ro
      - ../../ssl/.webroot:/var/www/certbot:ro
      # See docker/app/docker-compose.yml for why this path, not the
      # image's default /var/log/nginx.
      - /var/log/infra/management-proxy:/var/log/nginx-file
    networks:
      - jenkins_net
      - observability_net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    healthcheck:
      # Not http://localhost/ - port 80 redirects to https://$host/ (real
      # domain in production, but wget without --header sends Host:
      # localhost), and no cert here has "localhost" in its SAN, so wget
      # following that redirect fails TLS hostname verification even
      # though nginx itself is completely healthy. Hit 443 directly
      # instead, same --no-check-certificate pattern already used for
      # registry's internal healthcheck - this container isn't validating
      # a real domain, just confirming nginx answers.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
