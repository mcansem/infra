name: jenkins

networks:
  jenkins_net:
    name: jenkins_net
    driver: bridge

volumes:
  jenkins_home:
    name: jenkins_home

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOCKER_GID: ${DOCKER_GID:-999}
    image: infra/jenkins:local
    container_name: jenkins
    # Bounded, not "always": a persistently misconfigured/crash-looping
    # Jenkins (bad plugin, broken JCasC) shouldn't restart forever - same
    # reasoning as postgres in docker/app/. See docker/app/README.md.
    restart: on-failure:5
    stop_grace_period: 60s
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      CASC_JENKINS_CONFIG: /var/jenkins_home/casc.yaml
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./casc.yaml:/var/jenkins_home/casc.yaml:ro
    networks:
      - jenkins_net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  nginx:
    image: nginx:alpine
    container_name: jenkins-nginx
    restart: unless-stopped
    stop_grace_period: 10s
    security_opt:
      - no-new-privileges:true
    depends_on:
      jenkins:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../ssl/jenkins:/etc/nginx/certs:ro
      - ../ssl/.webroot:/var/www/certbot:ro
    networks:
      - jenkins_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
