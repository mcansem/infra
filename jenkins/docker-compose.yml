name: jenkins

networks:
  jenkins_net:
    name: jenkins_net
    driver: bridge

volumes:
  jenkins_home:
    name: jenkins_home

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOCKER_GID: ${DOCKER_GID:-999}
    image: infra/jenkins:local
    container_name: jenkins
    # Bounded, not "always": a persistently misconfigured/crash-looping
    # Jenkins (bad plugin, broken JCasC) shouldn't restart forever - same
    # reasoning as postgres in docker/app/. See docker/app/README.md.
    restart: on-failure:5
    stop_grace_period: 60s
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      CASC_JENKINS_CONFIG: /var/jenkins_home/casc.yaml
      # MaxRAMPercentage (not a fixed -Xmx) so the JVM heap scales
      # automatically if the container memory limit below ever changes -
      # the JVM reads the cgroup limit, not host RAM. 60% leaves room
      # under the 768M cap for metaspace/threads/native buffers and the
      # docker CLI subprocess pipeline stages shell out to.
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false -XX:MaxRAMPercentage=60.0 -XX:MinRAMPercentage=25.0
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./casc.yaml:/var/jenkins_home/casc.yaml:ro
    networks:
      - jenkins_net
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 768M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
